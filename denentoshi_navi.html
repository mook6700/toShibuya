
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>田園都市線 音声案内</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #0f1923;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 40px;
    }

    .header {
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 36px 0 20px;
    }
    .header .line-badge {
      display: inline-block;
      background: #009944;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
    .header .route { margin-top: 6px; font-size: 13px; color: #8ecf9e; }

    .clock-card {
      width: 100%;
      max-width: 400px;
      background: #1a2634;
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .clock-card .label { font-size: 12px; color: #7a8fa0; }
    .clock-card .time  { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .clock-card .date  { font-size: 12px; color: #7a8fa0; text-align: right; }

    .mic-section {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 8px 0 20px;
    }
    .mic-btn {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: none;
      background: #009944;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,153,68,0.45);
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .mic-btn:active { transform: scale(0.94); }
    .mic-btn.listening {
      background: #d0021b;
      box-shadow: 0 4px 24px rgba(208,2,27,0.5);
      animation: pulse 1.2s infinite;
    }
    .mic-btn.speaking {
      background: #1a6fc4;
      box-shadow: 0 4px 24px rgba(26,111,196,0.5);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 4px 24px rgba(208,2,27,0.5); }
      50%      { box-shadow: 0 4px 40px rgba(208,2,27,0.8); }
    }
    .mic-btn svg { width: 36px; height: 36px; fill: #fff; }
    .mic-hint { margin-top: 12px; font-size: 13px; color: #7a8fa0; text-align: center; min-height: 20px; }

    .transcript-box {
      width: 100%;
      max-width: 400px;
      background: #1a2634;
      border-radius: 12px;
      padding: 12px 16px;
      min-height: 52px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #c0cdd8;
      line-height: 1.5;
      display: none;
    }
    .transcript-box.visible { display: block; }
    .transcript-box .t-label { font-size: 11px; color: #7a8fa0; margin-bottom: 4px; }

    .result-card {
      width: 100%;
      max-width: 400px;
      background: #1a2634;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: none;
      border-left: 4px solid #009944;
    }
    .result-card.visible { display: block; }
    .result-card.error { border-left-color: #d0021b; }
    .result-card .r-label { font-size: 11px; color: #7a8fa0; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .result-card .r-time { font-size: 48px; font-weight: 800; font-variant-numeric: tabular-nums; color: #5dde8a; line-height: 1; }
    .result-card .r-time .r-unit { font-size: 18px; font-weight: 400; margin-left: 4px; }
    .result-card .r-sub { margin-top: 10px; font-size: 13px; color: #7a8fa0; line-height: 1.6; }
    .result-card .r-tag { display: inline-block; font-size: 11px; background: #009944; color: #fff; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
    .result-card .r-error-text { font-size: 15px; color: #f47a7a; line-height: 1.5; }

    .example-section { width: 100%; max-width: 400px; }
    .example-section h3 { font-size: 12px; color: #7a8fa0; margin-bottom: 8px; letter-spacing: 0.06em; }
    .example-btn {
      width: 100%;
      background: #1a2634;
      border: 1px solid #2a3a4a;
      border-radius: 10px;
      color: #c0cdd8;
      font-size: 13px;
      padding: 11px 14px;
      text-align: left;
      cursor: pointer;
      margin-bottom: 8px;
      line-height: 1.45;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .example-btn:active { background: #243344; }

    .notice { width: 100%; max-width: 400px; font-size: 11px; color: #4a5a6a; margin-top: 16px; line-height: 1.6; text-align: center; }

    .day-toggle {
      width: 100%; max-width: 400px;
      margin-bottom: 12px;
      display: flex; justify-content: center;
    }
    .day-toggle button {
      font-size: 13px; font-weight: 700;
      padding: 8px 24px;
      border: none; border-radius: 20px;
      color: #8ecf9e; cursor: pointer;
      background: #1a3a2a;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="line-badge">田園都市線</div>
  <h1>音声乗換案内</h1>
  <div class="route" id="routeLabel">溝の口 → 渋谷</div>
</div>

<div class="clock-card">
  <div>
    <div class="label">現在時刻</div>
    <div class="time" id="clockTime">--:--</div>
  </div>
  <div class="date" id="clockDate">---</div>
</div>

<div class="day-toggle">
  <button id="dayToggle" onclick="toggleDayType()">📅 平日ダイヤ</button>
</div>

<div class="mic-section">
  <button class="mic-btn" id="micBtn" onclick="handleMicClick()">
    <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 16.93V20H9v2h6v-2h-2v-2.07A8.001 8.001 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8.001 8.001 0 0 0 7 7.93z"/></svg>
  </button>
  <div class="mic-hint" id="micHint">タップして話す</div>
</div>

<div class="transcript-box" id="transcriptBox">
  <div class="t-label">認識した音声</div>
  <div id="transcriptText"></div>
</div>

<div class="result-card" id="resultCard">
  <div class="r-label">最速の出発時刻</div>
  <div class="r-time" id="resultTime">--:--</div>
  <div class="r-sub" id="resultSub"></div>
</div>

<div class="example-section">
  <h3>例文（タップで試す）</h3>
  <button class="example-btn" onclick="simulateVoice('10分後に溝の口に着きます。渋谷行きの次の電車は何時ですか')">
    「10分後に溝の口に着きます。渋谷行きの次の電車は？」
  </button>
  <button class="example-btn" onclick="simulateVoice('8分後に溝の口に着きます。渋谷行きの次の電車は何時ですか')">
    「8分後に溝の口に着きます。渋谷行きの次の電車は？」
  </button>
  <button class="example-btn" onclick="simulateVoice('5分後に溝の口に着きます。渋谷行きの次の電車は何時ですか')">
    「5分後に溝の口に着きます。渋谷行きの次の電車は？」
  </button>
  <button class="example-btn" onclick="simulateVoice('今すぐ溝の口から渋谷行き')">
    「今すぐ溝の口から渋谷行き」
  </button>
</div>

<div class="notice">
  ※ダイヤは参考値です。正確な時刻は東急電鉄公式サイトでご確認ください。<br>
  ※音声認識にはiOS Safariの許可が必要です。
</div>

<script>
/* ── 行き先マスター ── */
const DEST = {
  shibuya:        { name:'渋谷',       dir:'fwd', durExpress:18, durLocal:22 },
  sangenjaya:     { name:'三軒茶屋',   dir:'fwd', durExpress:11, durLocal:20 },
  futakotamagawa: { name:'二子玉川',   dir:'fwd', durExpress:4,  durLocal:5  },
  futakoshinchi:  { name:'二子新地',   dir:'fwd', durExpress:null, durLocal:3, localOnly:true },
  tamaplaza:      { name:'たまプラーザ', dir:'rev', durExpress:8,  durLocal:10 },
  azamino:        { name:'あざみ野',   dir:'rev', durExpress:11, durLocal:14 },
};

/* ── 平日：渋谷方面（溝の口発） ── */
const SCHEDULE_FWD = buildSchedule([
  { from:5*60,  to:6*60,  interval:12, types:['各停']             },
  { from:6*60,  to:7*60,  interval:6,  types:['各停','急行']      },
  { from:7*60,  to:9*60,  interval:3,  types:['各停','準急','急行']},
  { from:9*60,  to:11*60, interval:5,  types:['急行','各停']      },
  { from:11*60, to:16*60, interval:6,  types:['急行','各停']      },
  { from:16*60, to:19*60, interval:4,  types:['急行','準急','各停']},
  { from:19*60, to:22*60, interval:5,  types:['急行','各停']      },
  { from:22*60, to:24*60, interval:8,  types:['各停']             },
  { from:24*60, to:25*60, interval:12, types:['各停']             },
]);

/* ── 平日：中央林間方面（溝の口発）── */
const SCHEDULE_REV = buildSchedule([
  { from:5*60+3,  to:6*60+3,  interval:12, types:['各停']             },
  { from:6*60+3,  to:7*60+3,  interval:6,  types:['各停','急行']      },
  { from:7*60+3,  to:9*60+3,  interval:3,  types:['各停','準急','急行']},
  { from:9*60+3,  to:11*60+3, interval:5,  types:['急行','各停']      },
  { from:11*60+3, to:16*60+3, interval:6,  types:['急行','各停']      },
  { from:16*60+3, to:19*60+3, interval:4,  types:['急行','準急','各停']},
  { from:19*60+3, to:22*60+3, interval:5,  types:['急行','各停']      },
  { from:22*60+3, to:24*60+3, interval:8,  types:['各停']             },
  { from:24*60+3, to:25*60+3, interval:12, types:['各停']             },
]);

/* ── 土休日：渋谷方面（溝の口発） ── */
const SCHEDULE_FWD_HOL = buildSchedule([
  { from:5*60,  to:6*60,  interval:12, types:['各停']        },
  { from:6*60,  to:8*60,  interval:8,  types:['各停','急行'] },
  { from:8*60,  to:11*60, interval:6,  types:['急行','各停'] },
  { from:11*60, to:17*60, interval:5,  types:['急行','各停'] },
  { from:17*60, to:20*60, interval:6,  types:['急行','各停'] },
  { from:20*60, to:22*60, interval:7,  types:['急行','各停'] },
  { from:22*60, to:24*60, interval:8,  types:['各停']        },
  { from:24*60, to:25*60, interval:12, types:['各停']        },
]);

/* ── 土休日：中央林間方面（溝の口発） ── */
const SCHEDULE_REV_HOL = buildSchedule([
  { from:5*60+3,  to:6*60+3,  interval:12, types:['各停']        },
  { from:6*60+3,  to:8*60+3,  interval:8,  types:['各停','急行'] },
  { from:8*60+3,  to:11*60+3, interval:6,  types:['急行','各停'] },
  { from:11*60+3, to:17*60+3, interval:5,  types:['急行','各停'] },
  { from:17*60+3, to:20*60+3, interval:6,  types:['急行','各停'] },
  { from:20*60+3, to:22*60+3, interval:7,  types:['急行','各停'] },
  { from:22*60+3, to:24*60+3, interval:8,  types:['各停']        },
  { from:24*60+3, to:25*60+3, interval:12, types:['各停']        },
]);

/* ── 曜日判定 ── */
let dayType = (new Date().getDay() === 0 || new Date().getDay() === 6) ? 'hol' : 'wday';

function toggleDayType() {
  dayType = dayType === 'wday' ? 'hol' : 'wday';
  updateDayToggle();
}
function updateDayToggle() {
  const btn = document.getElementById('dayToggle');
  if (!btn) return;
  btn.textContent = dayType === 'wday' ? '📅 平日ダイヤ' : '🏖 土休日ダイヤ';
  btn.style.background = dayType === 'wday' ? '#1a3a2a' : '#3a2a1a';
}

function buildSchedule(patterns) {
  const trains = [];
  patterns.forEach(p => {
    let t = p.from, ti = 0;
    while (t < p.to) {
      trains.push({ depMin: t % (24*60), type: p.types[ti % p.types.length] });
      t += p.interval; ti++;
    }
  });
  return trains.sort((a,b) => a.depMin - b.depMin);
}

function formatMin(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }

function findNextTrain(targetMin, schedule, localOnly) {
  const norm = targetMin % (24*60);
  const list = localOnly ? schedule.filter(t => t.type==='各停') : schedule;
  for (const t of list) if (t.depMin >= norm) return t;
  return list[0];
}

/* ── 行き先を音声テキストから判定 ── */
function extractDest(text) {
  if (/三軒茶屋|さんげんじゃや|三茶/.test(text))           return 'sangenjaya';
  if (/二子新地|ふたこしんち/.test(text))                   return 'futakoshinchi';
  if (/二子玉川|ふたこたまがわ|二子玉/.test(text))         return 'futakotamagawa';
  if (/たまプラーザ|たまぷらーざ|玉川学園/.test(text))    return 'tamaplaza';
  if (/あざみ野|あざみの/.test(text))                       return 'azamino';
  if (/渋谷|しぶや/.test(text))                             return 'shibuya';
  return 'shibuya'; // デフォルト
}

function extractMinutesLater(text) {
  const kanjiMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15};
  let m = text.match(/(\d+)\s*分\s*後/);
  if (m) return parseInt(m[1]);
  for (const [k,v] of Object.entries(kanjiMap)) if (text.includes(k+'分後')) return v;
  if (/すぐ|今すぐ/.test(text)) return 0;
  if (/溝の口/.test(text)) return 0;
  return null;
}

function processQuery(text) {
  showTranscript(text);
  const minutesLater = extractMinutesLater(text);
  if (minutesLater === null) {
    showError('「○分後に溝の口に着く」や行き先（渋谷・三軒茶屋・二子玉川など）をお話しください。');
    speak('すみません、もう少し具体的にお話しください。例えば、7分後に溝の口に着くので渋谷行きを教えて、のようにどうぞ。');
    return;
  }
  const destKey = extractDest(text);
  const dest    = DEST[destKey];
  const schedule = dest.dir === 'fwd'
    ? (dayType === 'wday' ? SCHEDULE_FWD : SCHEDULE_FWD_HOL)
    : (dayType === 'wday' ? SCHEDULE_REV : SCHEDULE_REV_HOL);
  const arrivalMin = nowMin() + minutesLater;
  const train = findNextTrain(arrivalMin, schedule, dest.localOnly);

  // 所要時間（急行/準急は速い、各停は遅い）
  const isExpress = train.type === '急行' || train.type === '準急';
  const dur = isExpress && dest.durExpress ? dest.durExpress : dest.durLocal;
  const arrivalAtDest = train.depMin + dur;
  const waitMin = train.depMin - arrivalMin;

  document.getElementById('routeLabel').textContent = `溝の口 → ${dest.name}`;
  showResult(train, formatMin(train.depMin), formatMin(arrivalAtDest), waitMin, dest.name);

  const h = Math.floor(train.depMin/60), mn = train.depMin%60;
  let msg = minutesLater > 0 ? `${minutesLater}分後に溝の口へ到着後、` : '';
  msg += `溝の口発${h}時${mn>0?mn+'分':''}の${train.type}に乗れます。${dest.name}には${Math.floor(arrivalAtDest/60)}時${arrivalAtDest%60>0?arrivalAtDest%60+'分':''}頃に到着します。`;
  speak(msg);
}

function showTranscript(text) {
  document.getElementById('transcriptText').textContent = text;
  document.getElementById('transcriptBox').classList.add('visible');
}

function showResult(train, depStr, arrStr, waitMin, destName) {
  const card = document.getElementById('resultCard');
  card.classList.remove('error');
  card.classList.add('visible');
  card.style.borderLeftColor = '#009944';
  document.getElementById('resultTime').innerHTML = `${depStr}<span class="r-unit">発</span>`;
  const waitLabel = waitMin <= 0 ? '（ちょうど間に合います）' : `（到着後 ${waitMin}分待ち）`;
  document.getElementById('resultSub').innerHTML =
    `種別：${train.type} <span class="r-tag">${train.type}</span><br>` +
    `${destName}到着予定：${arrStr} 頃<br>` +
    `<span style="color:#5dde8a">${waitLabel}</span>`;
}

function showError(msg) {
  const card = document.getElementById('resultCard');
  card.classList.add('visible', 'error');
  card.style.borderLeftColor = '#d0021b';
  document.getElementById('resultTime').innerHTML = '<span style="font-size:20px">⚠</span>';
  document.getElementById('resultSub').innerHTML = `<span class="r-error-text">${msg}</span>`;
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 1.0;
  const micBtn = document.getElementById('micBtn');
  utt.onstart = () => { micBtn.classList.add('speaking'); setHint('読み上げ中...'); };
  utt.onend   = () => { micBtn.classList.remove('speaking'); setHint('タップして話す'); };
  window.speechSynthesis.speak(utt);
}

let recognition = null;

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = false;
  r.interimResults = true;
  const micBtn = document.getElementById('micBtn');
  r.onstart  = () => { micBtn.classList.add('listening'); setHint('聞いています...'); };
  r.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    showTranscript(final || interim);
    if (final) processQuery(final);
  };
  r.onerror = (e) => {
    micBtn.classList.remove('listening');
    // abortedはiOS Safariが一時的に中断しただけ → 自動リトライ
    if (e.error === 'aborted') {
      setHint('タップして話す');
      setTimeout(() => startRecognition(), 400);
      return;
    }
    const msgs = {
      'not-allowed': 'マイクへのアクセスが拒否されました。Safariの設定で許可してください。',
      'no-speech':   '音声が検出されませんでした。もう一度お試しください。',
      'network':     'ネットワークエラーが発生しました。'
    };
    setHint(msgs[e.error] || 'エラー。再度タップしてください。');
    showError(msgs[e.error] || 'エラー: ' + e.error);
  };
  r.onend = () => {
    micBtn.classList.remove('listening');
    if (!document.getElementById('resultCard').classList.contains('visible')) setHint('タップして話す');
  };
  return r;
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('このブラウザは音声認識に対応していません。Safari (iOS) をお使いください。'); return; }
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  recognition = initRecognition();
  if (recognition) {
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('transcriptBox').classList.remove('visible');
    // 少し待ってから開始（iOS Safariの準備を待つ）
    setTimeout(() => { try { recognition.start(); } catch(e) {} }, 150);
  }
}

function handleMicClick() {
  if (window.speechSynthesis && window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.getElementById('micBtn').classList.remove('speaking');
    setHint('タップして話す');
    // TTSが止まってから認識開始
    setTimeout(() => startRecognition(), 400);
    return;
  }
  startRecognition();
}

function simulateVoice(text) {
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('transcriptBox').classList.remove('visible');
  setTimeout(() => processQuery(text), 100);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('clockDate').textContent =
    `${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
}

function setHint(t) { document.getElementById('micHint').textContent = t; }

updateClock();
setInterval(updateClock, 1000);
updateDayToggle();

document.addEventListener('touchstart', function warmup() {
  if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
  document.removeEventListener('touchstart', warmup);
}, { once: true });
</script>
</body>
</html>
